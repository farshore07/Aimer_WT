<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AimerWT | 遥测数据仪表盘 v1.1</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <div class="layout-wrapper">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">A</div>
                <div class="sidebar-brand">
                    <h1>遥测数据仪表盘</h1>
                    <p>123123 指标总览</p>
                </div>
            </div>
            <div class="sidebar-menu">
                <div class="menu-item active" data-view="dashboard" onclick="app.switchView('dashboard', this)">
                    <div class="menu-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </div>
                    <span>主页</span>
                </div>
                <div class="menu-item menu-item-with-submenu" id="controlMenuItem" onclick="app.handleControlMenuClick(this)">
                    <div class="menu-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                        </svg>
                    </div>
                    <span>操控</span>
                    <span class="submenu-arrow">
                        <svg viewBox="0 0 24 24">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </span>
                </div>
                <div class="submenu" id="controlSubmenu">
                    <div class="submenu-item" data-view="notification" onclick="app.switchView('notification', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                        </div>
                        <span>通知</span>
                    </div>
                    <div class="submenu-item" data-view="announcement" onclick="app.switchView('announcement', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </div>
                        <span>公告栏</span>
                    </div>
                    <div class="submenu-item" data-view="banner" onclick="app.switchView('banner', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </div>
                        <span>Banner</span>
                    </div>
                    <div class="submenu-item" data-view="advertisement" onclick="app.switchView('advertisement', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="9" y1="21" x2="9" y2="9"></line>
                            </svg>
                        </div>
                        <span>广告</span>
                    </div>
                    <div class="submenu-item" data-view="feedback" onclick="app.switchView('feedback', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </div>
                        <span>反馈</span>
                    </div>
                </div>
                <div class="menu-item menu-item-with-submenu" id="userMenuItem" onclick="app.handleUserMenuClick(this)">
                    <div class="menu-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <span>用户</span>
                    <span class="submenu-arrow">
                        <svg viewBox="0 0 24 24">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </span>
                </div>
                <div class="submenu" id="userSubmenu">
                    <div class="submenu-item" data-view="userlist" onclick="app.switchView('userlist', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                        </div>
                        <span>用户列表</span>
                    </div>
                    <div class="submenu-item" data-view="userdetail" onclick="app.switchView('userdetail', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <span>用户详情</span>
                    </div>
                </div>
                <div class="menu-item menu-item-with-submenu" id="aiMenuItem" onclick="app.handleAiMenuClick(this)">
                    <div class="menu-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </div>
                    <span>AI功能</span>
                    <span class="submenu-arrow">
                        <svg viewBox="0 0 24 24">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </span>
                </div>
                <div class="submenu" id="aiSubmenu">
                    <div class="submenu-item" data-view="ai_assistant" onclick="app.switchView('ai_assistant', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </div>
                        <span>AI助手</span>
                    </div>
                    <div class="submenu-item" data-view="ai_usage" onclick="app.switchView('ai_usage', this); event.stopPropagation();">
                        <div class="submenu-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="20" x2="18" y2="10"></line>
                                <line x1="12" y1="20" x2="12" y2="4"></line>
                                <line x1="6" y1="20" x2="6" y2="14"></line>
                            </svg>
                        </div>
                        <span>大模型用量</span>
                    </div>
                </div>
                <div class="menu-item" data-view="analysis" onclick="app.switchView('analysis', this)">
                    <div class="menu-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                    </div>
                    <span>数据分析</span>
                </div>
                <div class="menu-item" data-view="settings" onclick="app.switchView('settings', this)">
                    <div class="menu-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </div>
                    <span>设置</span>
                </div>
                <div class="menu-item" data-view="notes" onclick="app.switchView('notes', this)">
                    <div class="menu-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <span>说明</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="update-timer">
                    <span>下次数据更新</span>
                    <span class="time-remaining" id="updateCountdown">05:00</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="updateProgressBar" style="width: 100%;"></div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content" id="mainContent">
            <!-- 动态加载的视图内容 -->
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-mask" id="controlModalMask" onclick="app.closeControlModal()"></div>
    <div class="modal" id="controlModal">
        <div class="modal-header">
            <h3 id="controlModalTitle">操作</h3>
            <button class="btn-icon" onclick="app.closeControlModal()">×</button>
        </div>
        <div class="modal-body" id="controlModalBody"></div>
        <div class="modal-footer">
            <button class="btn" onclick="app.closeControlModal()">取消</button>
            <button class="btn primary" id="controlModalSubmit" onclick="app.submitControl()">确认</button>
        </div>
    </div>

    <!-- 抽屉 -->
    <div class="drawer-mask" id="drawerMask" onclick="app.closeDrawer()"></div>
    <div class="drawer" id="drilldownDrawer">
        <div class="drawer-header">
            <div>
                <div class="panel-title" id="drawerTitle">详情</div>
                <div class="panel-sub" id="drawerSub">-</div>
            </div>
            <button class="btn" onclick="app.closeDrawer()">关闭</button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
