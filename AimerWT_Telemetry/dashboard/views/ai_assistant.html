<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div class="panel-title">AI助手配置</div>
            <div class="top-actions" style="margin-left: auto;">
                <button class="btn" onclick="app.loadAIConfig()">刷新</button>
                <button class="btn primary" onclick="app.saveAIConfig()">保存配置</button>
            </div>
        </div>

        <div id="aiConfigStatus" style="margin-bottom: 16px;"></div>

        <!-- 对话统计概览 -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;">
            <div style="background: var(--bg-card, #fff); border-radius: 12px; padding: 16px 20px; border: 1px solid var(--border);">
                <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 6px;">今日对话</div>
                <div style="font-size: 28px; font-weight: 700; color: var(--primary);" id="aiTodayRequests">-</div>
            </div>
            <div style="background: var(--bg-card, #fff); border-radius: 12px; padding: 16px 20px; border: 1px solid var(--border);">
                <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 6px;">总计对话</div>
                <div style="font-size: 28px; font-weight: 700; color: var(--text);" id="aiTotalRequests">-</div>
            </div>
            <div style="background: var(--bg-card, #fff); border-radius: 12px; padding: 16px 20px; border: 1px solid var(--border);">
                <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 6px;">今日消耗 Tokens</div>
                <div style="font-size: 28px; font-weight: 700; color: var(--secondary, #10b981);" id="aiTodayTokens">-</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <!-- API 配置 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">API 配置</div>
                </div>
                <div class="panel-body">
                    <div class="form-group">
                        <label>提供商标记 <span style="font-size: 11px; color: var(--text-muted); font-weight: 400;">（仅标记用途，不影响实际调用）</span></label>
                        <input class="input" style="width: 100%;" id="aiProvider" placeholder="例如: zhipu / deepseek / openai / relay">
                    </div>
                    <div class="form-group">
                        <label>API 地址 <span style="font-size: 11px; color: var(--text-muted); font-weight: 400;">（OpenAI 兼容格式的 chat/completions 端点）</span></label>
                        <input class="input" style="width: 100%;" id="aiApiUrl" placeholder="https://api.example.com/v1/chat/completions">
                    </div>
                    <div class="form-group">
                        <label>模型名称 <span style="font-size: 11px; color: var(--text-muted); font-weight: 400;">（自由填写，取决于提供商支持）</span></label>
                        <input class="input" style="width: 100%;" id="aiModel" placeholder="例如: glm-4-flash / deepseek-chat / gpt-4o-mini">
                    </div>
                    <!-- 预设模板快捷按钮 -->
                    <div class="form-group">
                        <label>快捷预设 <span style="font-size: 11px; color: var(--text-muted); font-weight: 400;">（点击自动填充提供商/地址/模型）</span></label>
                        <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                            <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.applyAIPreset('zhipu')">智谱 GLM</button>
                            <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.applyAIPreset('deepseek')">DeepSeek</button>
                            <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.applyAIPreset('siliconflow')">硅基流动</button>
                            <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.applyAIPreset('qwen')">阿里通义</button>
                            <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.applyAIPreset('doubao')">豆包</button>
                            <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.applyAIPreset('openai')">OpenAI 官方</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- API Key + 模型参数 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">API Key & 参数</div>
                </div>
                <div class="panel-body">
                    <div class="form-group">
                        <label>API Key</label>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="password" class="input" style="flex: 1;" id="aiApiKeyInput" placeholder="输入 API Key（留空则使用环境变量）">
                            <button class="btn" onclick="app.toggleAIKeyVisibility()" id="aiKeyToggleBtn" style="white-space: nowrap; padding: 6px 10px;" title="显示/隐藏">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px; margin-top: 6px;">
                            <div id="aiApiKeyStatus" style="flex: 1; padding: 6px 10px; background: var(--bg-secondary); border-radius: 6px; font-size: 12px; color: var(--text-muted);">
                                加载中...
                            </div>
                            <button class="btn" onclick="app.testAIConnection()" id="aiTestBtn" style="white-space: nowrap; padding: 4px 10px; font-size: 12px;">检测连接</button>
                            <button class="btn" onclick="app.clearAIKey()" style="white-space: nowrap; padding: 4px 10px; font-size: 12px; color: var(--danger);" title="清空仪表盘配置的 Key，回退到环境变量">清空 Key</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>最大输出 Tokens</label>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <input type="range" style="flex: 1;" id="maxTokensSlider" min="0" max="8192" value="2048"
                                oninput="document.getElementById('aiMaxTokens').value = this.value">
                            <input class="input" style="width: 80px; text-align: center;" id="aiMaxTokens" value="2048"
                                oninput="document.getElementById('maxTokensSlider').value = this.value">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>温度 (Temperature)</label>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <input type="range" style="flex: 1;" id="temperatureSlider" min="0" max="200" value="70"
                                oninput="document.getElementById('aiTemperature').value = (this.value / 100).toFixed(2)">
                            <input class="input" style="width: 80px; text-align: center;" id="aiTemperature" value="0.70"
                                oninput="document.getElementById('temperatureSlider').value = Math.round(this.value * 100)">
                        </div>
                        <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">较低值更稳定，较高值更有创意</div>
                    </div>
                    <div class="form-group">
                        <label>最大对话历史条数</label>
                        <input class="input" style="width: 100%;" id="aiMaxHistory" value="30" type="number">
                        <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">15轮对话 = 30条消息（一问一答各算1条）</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 功能开关 -->
        <div class="panel" style="margin-top: 24px;">
            <div class="panel-header">
                <div class="panel-title">功能开关</div>
            </div>
            <div class="panel-body">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg-secondary); border-radius: 8px;">
                        <div>
                            <div style="font-weight: 500; font-size: 14px;">启用 AI 助手</div>
                            <div style="font-size: 12px; color: var(--text-muted);">客户端可使用代理模式 AI 功能</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="aiEnabled" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- 系统提示词 -->
        <div class="panel" style="margin-top: 24px;">
            <div class="panel-header">
                <div class="panel-title">系统提示词</div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div style="font-size: 12px; color: var(--text-muted);">修改后保存即时生效，所有用户统一使用此提示词。</div>
                    <button class="btn" style="white-space: nowrap; padding: 4px 10px; font-size: 12px;" onclick="app.useDefaultPrompt()">使用原始提示词</button>
                </div>
            </div>
            <div class="panel-body">
                <div class="form-group" style="margin-bottom: 0;">
                    <textarea class="input" style="width: 100%; height: 160px; font-family: inherit; padding: 12px; resize: vertical; line-height: 1.6;" id="aiSystemPrompt"></textarea>
                </div>
            </div>
        </div>

        <!-- 使用限制 -->
        <div class="panel" style="margin-top: 24px;">
            <div class="panel-header">
                <div class="panel-title">使用限制</div>
            </div>
            <div class="panel-body">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>每日请求上限（全局默认）</label>
                        <input class="input" style="width: 100%;" id="aiDailyLimit" value="15" type="number">
                        <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">每个用户每天最多对话次数，次数每天 0 点刷新，可对单个用户单独设置</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户封禁管理 -->
        <div class="panel" style="margin-top: 24px;">
            <div class="panel-header">
                <div class="panel-title">用户封禁管理</div>
                <div style="display: flex; gap: 8px;">
                    <input class="input" style="width: 220px; padding: 6px 12px; font-size: 13px;" placeholder="输入 Machine ID" id="banMachineId">
                    <input class="input" style="width: 160px; padding: 6px 12px; font-size: 13px;" placeholder="封禁原因（可选）" id="banReason">
                    <button class="btn" onclick="app.addAIBan()" style="white-space: nowrap;">封禁</button>
                </div>
            </div>
            <div class="panel-body" style="padding: 0;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Machine ID</th>
                            <th>别名</th>
                            <th>原因</th>
                            <th>封禁时间</th>
                            <th style="width: 80px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="aiBanTable"></tbody>
                </table>
                <div id="aiBanEmpty" style="padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px;">暂无封禁记录</div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof app !== 'undefined' && app.loadAIConfig) {
        app.loadAIConfig();
    }
});
</script>
