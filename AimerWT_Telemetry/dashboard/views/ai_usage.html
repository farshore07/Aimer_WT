<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div class="panel-title">大模型用量统计</div>
            <div class="top-actions" style="margin-left: auto;">
                <select class="select" style="width: auto; padding: 6px 12px;" id="usageTimeRange" onchange="app.filterUsageData()">
                    <option value="7">最近7天</option>
                    <option value="30" selected>最近30天</option>
                    <option value="90">最近90天</option>
                </select>
                <button class="btn" onclick="app.refreshUsageData()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                    刷新
                </button>
                <button class="btn primary" onclick="app.exportUsageData()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    导出
                </button>
            </div>
        </div>

        <div id="aiUsageStatsContainer" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;">
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px;">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">用量趋势</div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.switchUsageChart('tokens')">Tokens</button>
                        <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.switchUsageChart('requests')">请求数</button>
                        <button class="btn" style="padding: 4px 10px; font-size: 12px;" onclick="app.switchUsageChart('users')">用户数</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div style="height: 280px; display: flex; align-items: flex-end; justify-content: space-between; padding: 20px 10px; gap: 8px;" id="usageChart"></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">模型使用分布</div>
                </div>
                <div class="panel-body" id="modelDistributionContainer"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">用户用量排行</div>
                <div style="display: flex; gap: 8px;">
                    <input class="input" style="width: 200px; padding: 6px 12px; font-size: 13px;" placeholder="搜索用户..." id="searchUserUsage" oninput="app.searchUserUsage()">
                </div>
            </div>
            <div class="panel-body" style="padding: 0;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">排名</th>
                            <th>用户</th>
                            <th>对话次数</th>
                            <th>Tokens消耗</th>
                            <th>今日/限额</th>
                            <th>最后使用</th>
                            <th>状态</th>
                            <th style="width: 100px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="userUsageTable"></tbody>
                </table>
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-top: 1px solid var(--border);">
                    <div style="font-size: 13px; color: var(--text-muted);" id="usagePaginationInfo">共 0 条记录，第 1/1 页</div>
                    <div style="display: flex; gap: 4px;" id="usagePagination"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof app !== 'undefined' && app.initAIUsagePage) {
        app.initAIUsagePage();
    }
});
</script>
