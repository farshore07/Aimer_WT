<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div class="top-actions" style="margin-left: auto;">
                <button class="btn" onclick="app.loadPushStats()">刷新数据</button>
            </div>
        </div>
        <div class="grid">
            <div class="panel span-12" id="pushStatsPanel" style="display:none;">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:32px;height:32px;border-radius:10px;background:rgba(239,68,68,0.08);color:#ef4444;display:flex;align-items:center;justify-content:center;">
                            <i class="ri-send-plane-line" style="font-size:16px;"></i>
                        </div>
                        <div>
                            <div class="panel-title">推送覆盖率</div>
                            <div class="panel-sub" id="pushStatsSub">各推送渠道送达情况</div>
                        </div>
                    </div>
                    <div class="panel-actions">
                        <button class="btn" onclick="app.loadPushStats()" title="刷新推送数据">刷新</button>
                    </div>
                </div>
                <div id="pushStatsContent" style="padding:0 20px 16px;">
                    <div class="muted" style="text-align:center;padding:24px 0;">加载中...</div>
                </div>
            </div>
        </div>
        <div class="panel" id="analysisEmptyPanel">
            <div class="panel-header">
                <div class="panel-title">数据分析</div>
            </div>
            <div class="panel-body" style="padding: 24px;">
                <div style="text-align: center; color: var(--text-muted); padding: 60px;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; opacity: 0.5;">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <h3 style="margin-bottom: 8px;">统计数据</h3>
                    <p>深度数据分析、趋势预测、用户画像</p>
                </div>
            </div>
        </div>
    </div>
</div>
