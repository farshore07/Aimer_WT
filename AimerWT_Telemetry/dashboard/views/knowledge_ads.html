<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div class="top-actions" style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
                <button class="btn" onclick="app._toggleAllKnowledgeAds()" id="kbAdToggleAllBtn" style="font-size: 12px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    全部启用
                </button>
                <button class="btn" onclick="app._exportKnowledgeAdsJson()" style="font-size: 12px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    导出
                </button>
                <button class="btn" onclick="app._importKnowledgeAdsJson()" style="font-size: 12px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    导入
                </button>
                <button class="btn" onclick="app.loadKnowledgeAds()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    刷新数据
                </button>
                <button class="btn primary" onclick="app.publishKnowledgeAds()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                    保存并发布
                </button>
            </div>
        </div>

        <!-- 客户端实时预览 -->
        <div class="panel" style="margin-bottom: 20px;">
            <div class="panel-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 32px; height: 32px; background: rgba(139, 92, 246, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    </div>
                    <div>
                        <div class="panel-title">客户端实时预览</div>
                        <div class="panel-sub">模拟信息库页面广告位卡片的真实渲染效果（仅显示已启用项）</div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span id="kbAdPreviewCount" style="font-size: 12px; color: var(--text-muted); padding: 3px 10px; background: var(--bg); border-radius: 999px;">0/4 启用</span>
                </div>
            </div>
            <div class="panel-body" style="padding: 24px; background: repeating-conic-gradient(rgba(0,0,0,.04) 0% 25%, transparent 0% 50%) 50% / 16px 16px;">
                <div id="kbAdPreviewGrid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 820px; margin: 0 auto;"></div>
                <div id="kbAdPreviewEmpty" style="text-align: center; color: var(--text-muted); padding: 32px 20px; display: none;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.3; margin-bottom: 8px;"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    <p style="font-size: 13px; margin-top: 4px;">暂无启用的广告位，启用后将在此处预览</p>
                </div>
            </div>
        </div>

        <!-- 尺寸说明 + 快速参考（折叠式） -->
        <div style="margin-bottom: 20px;">
            <div onclick="this.parentElement.querySelector('.kb-ad-ref-content').classList.toggle('kb-ad-ref-show')" style="display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; transition: all 0.2s;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                <span style="font-size: 13px; font-weight: 600; color: var(--text);">尺寸说明与使用提示</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: auto; transition: transform 0.2s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div class="kb-ad-ref-content" style="max-height: 0; overflow: hidden; transition: max-height 0.3s ease; margin-top: -1px;">
                <div style="padding: 16px; background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; font-size: 12px; color: var(--text-muted); line-height: 1.7;">
                        <div style="padding: 12px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border);">
                            <strong style="color: var(--text); display: block; margin-bottom: 4px;">📐 头像尺寸</strong>
                            <code>80 × 80 像素</code><br>
                            圆角矩形，2x 适配 40×40 显示区域
                        </div>
                        <div style="padding: 12px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border);">
                            <strong style="color: var(--text); display: block; margin-bottom: 4px;">🖼️ 长条背景尺寸</strong>
                            <code>800 × 144 像素</code><br>
                            建议半透明/暗调，确保文字可读
                        </div>
                        <div style="padding: 12px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border);">
                            <strong style="color: var(--text); display: block; margin-bottom: 4px;">💡 使用说明</strong>
                            头像和背景可以都上，也可以只上一个。点击广告会自动追加 UTM 追踪参数。
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4 个广告位紧凑编辑卡片（2×2 网格） -->
        <div id="knowledgeAdSlots" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"></div>
    </div>
</div>

<style>
    .kb-ad-ref-show {
        max-height: 200px !important;
    }
    /* 预览卡片样式 - 模拟客户端 link-card-ad */
    .kb-preview-card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 0;
        position: relative;
        overflow: hidden;
        height: 72px;
        cursor: default;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .kb-preview-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }
    .kb-preview-card .kb-p-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-size: cover;
        background-position: center;
        z-index: 0;
    }
    .kb-preview-card .kb-p-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.15) 100%);
        z-index: 1;
    }
    .kb-preview-card .kb-p-content {
        position: relative;
        z-index: 2;
        height: 100%;
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .kb-preview-card .kb-p-icon {
        width: 36px; height: 36px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(139,92,246,0.08));
        color: #6b7280;
    }
    .kb-preview-card .kb-p-icon img {
        width: 100%; height: 100%; object-fit: cover; border-radius: 8px;
    }
    .kb-preview-card.has-bg .kb-p-icon {
        background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
    }
    .kb-preview-card .kb-p-info {
        flex: 1; min-width: 0;
    }
    .kb-preview-card .kb-p-title {
        font-size: 13px; font-weight: 600; color: #1f2937;
        line-height: 1.2;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .kb-preview-card .kb-p-desc {
        font-size: 10px; color: #6b7280; margin-top: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .kb-preview-card.has-bg .kb-p-title,
    .kb-preview-card.has-bg .kb-p-desc {
        color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .kb-preview-card .kb-p-arrow {
        font-size: 16px; color: #9ca3af; opacity: 0.5;
    }
    .kb-preview-card.has-bg .kb-p-arrow {
        color: rgba(255,255,255,0.6);
    }

    /* 广告位编辑卡片底部状态条 */
    .kb-ad-slot-status {
        display: flex; align-items: center; gap: 6px;
        padding: 8px 12px;
        background: var(--bg);
        border-top: 1px solid var(--border);
        border-radius: 0 0 16px 16px;
        margin: 0 -16px -16px;
        font-size: 11px;
        color: var(--text-muted);
    }
    .kb-ad-slot-status .kb-status-dot {
        width: 6px; height: 6px; border-radius: 50%;
    }
    .kb-ad-slot-status .kb-status-dot.on { background: #10b981; }
    .kb-ad-slot-status .kb-status-dot.off { background: #d1d5db; }
</style>
</div>
