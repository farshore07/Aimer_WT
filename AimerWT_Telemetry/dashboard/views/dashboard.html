<div class="view-container active">
    <div class="app">
        <div class="toolbar">
            <div class="toolbar-card">
                <span class="toolbar-title">数据筛选</span>
                <select class="select" id="filterOS" onchange="app.applyFilters()">
                    <option value="">全部操作系统</option>
                </select>
                <select class="select" id="filterArch" onchange="app.applyFilters()">
                    <option value="">全部架构</option>
                </select>
                <select class="select" id="filterVersion" onchange="app.applyFilters()">
                    <option value="">全部版本</option>
                </select>
                <select class="select" id="filterLocale" onchange="app.applyFilters()">
                    <option value="">全部区域</option>
                </select>
                <div style="margin-left: auto; display: flex; align-items: center; gap: 12px;">
                    <div class="muted" id="lastUpdate">最近更新 -</div>
                    <button class="btn" id="refreshBtn" onclick="app.refreshData()">刷新数据</button>
                    <button class="btn primary" onclick="app.handleControl('export')">导出数据</button>
                </div>
            </div>
        </div>

        <div class="alerts" id="alertContainer"></div>

        <!-- 重新设计的 KPI 卡片 -->
        <div class="kpi-grid">
            <div class="kpi-card" id="kpiTotal" style="position:relative;overflow:hidden;">
                <div style="position:absolute;top:-8px;right:-8px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(37,99,235,0.08),rgba(37,99,235,0.03));"></div>
                <div class="kpi-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;align-items:center;justify-content:center;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        </div>
                        <span style="font-weight:600;color:var(--text);font-size:13px;">总用户量</span>
                    </div>
                    <span class="muted" style="font-size:11px;">累计</span>
                </div>
                <div class="kpi-value" id="totalUsers" style="font-size:36px;letter-spacing:-1px;">-</div>
                <div class="kpi-meta">
                    <span class="trend up" id="totalUsersTrend">↑ 0%</span>
                    <span class="muted">累计增长率</span>
                </div>
            </div>
            <div class="kpi-card" id="kpiOnline" style="position:relative;overflow:hidden;">
                <div style="position:absolute;top:-8px;right:-8px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(16,185,129,0.03));"></div>
                <div class="kpi-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        </div>
                        <span style="font-weight:600;color:var(--text);font-size:13px;">在线用户</span>
                    </div>
                    <span class="muted" style="font-size:11px;">实时</span>
                </div>
                <div class="kpi-value" id="onlineUsers" style="font-size:36px;letter-spacing:-1px;">-</div>
                <div class="kpi-meta">
                    <span class="trend up" id="onlineRate">在线率 0%</span>
                    <span class="muted">当前在线</span>
                </div>
            </div>
            <div class="kpi-card" id="kpiToday" style="position:relative;overflow:hidden;">
                <div style="position:absolute;top:-8px;right:-8px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(245,158,11,0.03));"></div>
                <div class="kpi-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                        </div>
                        <span style="font-weight:600;color:var(--text);font-size:13px;">今日新增</span>
                    </div>
                    <span class="muted" style="font-size:11px;">日增</span>
                </div>
                <div class="kpi-value" id="todayNew" style="font-size:36px;letter-spacing:-1px;">-</div>
                <div class="kpi-meta">
                    <span class="trend up" id="todayNewTrend">↑ 0%</span>
                    <span class="muted">环比</span>
                </div>
            </div>
            <div class="kpi-card" id="kpiDau" style="position:relative;overflow:hidden;">
                <div style="position:absolute;top:-8px;right:-8px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(139,92,246,0.03));"></div>
                <div class="kpi-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);display:flex;align-items:center;justify-content:center;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        </div>
                        <span style="font-weight:600;color:var(--text);font-size:13px;">日活跃用户</span>
                    </div>
                    <span class="muted" style="font-size:11px;">DAU</span>
                </div>
                <div class="kpi-value" id="dauUsers" style="font-size:36px;letter-spacing:-1px;">-</div>
                <div class="kpi-meta">
                    <span class="trend up" id="dauTrend">↑ 0%</span>
                    <span class="muted">环比</span>
                </div>
            </div>
        </div>

        <!-- 趋势图表 -->
        <div class="grid">
            <div class="panel span-8">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(37,99,235,0.1),rgba(37,99,235,0.04));display:flex;align-items:center;justify-content:center;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        </div>
                        <div>
                            <div class="panel-title">用户增长趋势</div>
                            <div class="panel-sub" id="growthPeakInfo">峰值 -</div>
                        </div>
                    </div>
                    <div class="panel-actions">
                        <select class="select" id="trendRange" onchange="app.applyFilters()">
                            <option value="7">近7天</option>
                            <option value="14">近14天</option>
                            <option value="30" selected>近30天</option>
                            <option value="90">近90天</option>
                        </select>
                        <div class="compare-bar">
                            <span class="compare-tag">对比</span>
                            <input class="input" type="date" id="compareStart">
                            <span class="muted">至</span>
                            <input class="input" type="date" id="compareEnd">
                            <button class="btn" onclick="app.applyFilters()">应用</button>
                        </div>
                    </div>
                </div>
                <div class="chart" id="growthChart"></div>
            </div>
            <div class="panel span-4">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(16,185,129,0.04));display:flex;align-items:center;justify-content:center;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        </div>
                        <div>
                            <div class="panel-title">新增与日活对比</div>
                            <div class="panel-sub">趋势对比</div>
                        </div>
                    </div>
                </div>
                <div class="chart" id="newVsDauChart"></div>
            </div>
        </div>

        <!-- 分布图表 -->
        <div class="grid">
            <div class="panel span-3">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,rgba(37,99,235,0.1),rgba(37,99,235,0.04));display:flex;align-items:center;justify-content:center;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                        </div>
                        <div class="panel-title" style="font-size:13px;">操作系统分布</div>
                    </div>
                </div>
                <div class="chart sm" id="osChart"></div>
            </div>
            <div class="panel span-3">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,rgba(139,92,246,0.1),rgba(139,92,246,0.04));display:flex;align-items:center;justify-content:center;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
                        </div>
                        <div class="panel-title" style="font-size:13px;">架构分布</div>
                    </div>
                </div>
                <div class="chart sm" id="archChart"></div>
            </div>
            <div class="panel span-3">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.04));display:flex;align-items:center;justify-content:center;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        </div>
                        <div class="panel-title" style="font-size:13px;">软件版本分布</div>
                    </div>
                </div>
                <div class="chart sm" id="versionChart"></div>
            </div>
            <div class="panel span-3">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(16,185,129,0.04));display:flex;align-items:center;justify-content:center;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        </div>
                        <div class="panel-title" style="font-size:13px;">区域分布</div>
                    </div>
                </div>
                <div class="chart sm" id="localeChart"></div>
            </div>
        </div>

        <!-- 用户信息（不修改） -->
        <div class="grid">
            <div class="panel span-6">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">最新活跃用户</div>
                        <div class="panel-sub">最近更新的在线用户</div>
                    </div>
                </div>
                <div class="recent-list" id="recentUsersList"></div>
            </div>
            <div class="panel span-6">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">用户详细信息</div>
                        <div class="panel-sub" id="userDetailSub">点击左侧用户查看详情</div>
                    </div>
                </div>
                <div class="detail-grid" id="userDetailGrid"></div>
            </div>
        </div>
    </div>
</div>
