<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div class="top-actions" style="margin-left: auto;">
                <button class="btn" onclick="app.loadAdCarousel()">刷新数据</button>
                <button class="btn primary" onclick="app.addAdItem()">添加广告</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <!-- 左列：广告列表 -->
            <div class="panel">
                <div class="panel-header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 32px; height: 32px; background: rgba(37, 99, 235, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="9" y1="21" x2="9" y2="9"></line>
                            </svg>
                        </div>
                        <div>
                            <div class="panel-title">广告轮播管理</div>
                            <div class="panel-sub">客户端主页左上角轮播图，点击可跳转链接</div>
                        </div>
                    </div>
                </div>
                <div class="panel-body" style="padding: 0;">
                    <div id="adCarouselList" style="min-height: 120px;">
                        <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                            加载中...
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右列：编辑/轮播设置 -->
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <!-- 编辑区域 -->
                <div class="panel" id="adEditPanel">
                    <div class="panel-header">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </div>
                            <div>
                                <div class="panel-title" id="adEditTitle">选择或添加广告</div>
                                <div class="panel-sub">编辑广告项的图片地址、跳转链接等属性</div>
                            </div>
                        </div>
                    </div>
                    <div class="panel-body" style="padding: 20px;">
                        <div id="adEditEmpty" style="text-align: center; color: var(--text-muted); padding: 24px;">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; opacity: 0.4;">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <p>点击列表中的广告项进行编辑，或点击"添加广告"新建</p>
                        </div>
                        <div id="adEditForm" style="display: none;">
                            <div class="form-group">
                                <label>广告 ID</label>
                                <input class="input" style="width: 100%;" id="adEditId" placeholder="唯一标识，如 ad_banner_01">
                            </div>
                            <div class="form-group">
                                <label>图片地址</label>
                                <input class="input" style="width: 100%;" id="adEditImage" placeholder="相对路径或 URL，如 ads/default_image/ads_1.webp">
                            </div>
                            <div class="form-group">
                                <label>替代文字</label>
                                <input class="input" style="width: 100%;" id="adEditAlt" placeholder="图片无法加载时显示的文字">
                            </div>
                            <div class="form-group">
                                <label>跳转链接</label>
                                <input class="input" style="width: 100%;" id="adEditUrl" placeholder="点击后打开的 URL">
                            </div>
                            <div style="display: flex; gap: 10px; margin-top: 8px;">
                                <button class="btn primary" style="flex: 1; justify-content: center;" onclick="app.saveAdItem()">保存修改</button>
                                <button class="btn" style="justify-content: center;" onclick="app.cancelAdEdit()">取消</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 轮播设置 -->
                <div class="panel">
                    <div class="panel-header">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; background: rgba(245, 158, 11, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                                </svg>
                            </div>
                            <div>
                                <div class="panel-title">轮播配置</div>
                                <div class="panel-sub">自动播放间隔与全局设置</div>
                            </div>
                        </div>
                    </div>
                    <div class="panel-body" style="padding: 20px;">
                        <div class="form-group">
                            <label>自动播放间隔 (毫秒)</label>
                            <input class="input" type="number" style="width: 100%;" id="adIntervalMs" value="4500" min="1000" step="500">
                        </div>
                        <button class="btn primary" style="width: 100%; justify-content: center;" onclick="app.saveAdCarouselAll()">保存全部配置</button>
                    </div>
                </div>

                <!-- 说明 -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">接入说明</div>
                    </div>
                    <div class="panel-body" style="padding: 20px; font-size: 12px; color: var(--text-muted); line-height: 1.8;">
                        <div style="margin-bottom: 8px;">
                            <strong style="color: var(--text);">数据链路</strong><br>
                            仪表盘编辑 → POST /admin/ad-carousel → SQLite 持久化 → 客户端遥测心跳 → ad_carousel_config 覆盖 → 轮播刷新
                        </div>
                        <div>
                            <strong style="color: var(--text);">图片路径</strong><br>
                            客户端使用相对路径（如 <code>ads/default_image/ads_1.webp</code>），指向 web 目录下的资源文件。远程更换图片需先将图片部署到客户端资源目录。
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
