<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 36px; height: 36px; background: rgba(37, 99, 235, 0.08); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <i class="ri-palette-line" style="font-size: 18px; color: var(--primary);"></i>
                </div>
                <div>
                    <div style="font-weight: 700; font-size: 16px; color: var(--text);">主题兑换码</div>
                    <div style="color: var(--text-muted); font-size: 12px;">维护服务器主题池，也可扫描 themes/remote/ 下的 remote_*.json</div>
                </div>
            </div>
            <div class="top-actions" style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
                <button class="btn" onclick="app.loadRemoteThemes()">
                    <i class="ri-refresh-line"></i>
                    刷新
                </button>
                <button class="btn" onclick="app.importRemoteThemeFiles()">
                    <i class="ri-folder-download-line"></i>
                    扫描服务器文件
                </button>
                <button class="btn primary" onclick="app.resetRemoteThemeForm()">
                    <i class="ri-add-line"></i>
                    新建主题
                </button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: minmax(360px, 420px) 1fr; gap: 18px; align-items: start;">
            <div class="panel">
                <div class="panel-header">
                    <div>
                        <div class="panel-title" id="remoteThemeFormTitle">新建远程主题</div>
                        <div class="panel-sub">文件名必须为 remote_ 开头的小写 JSON，兑换码会按此文件名绑定</div>
                    </div>
                </div>
                <div class="panel-body" style="display: grid; gap: 12px;">
                    <input type="hidden" id="remoteThemeId">
                    <label class="form-row">
                        <span>文件名</span>
                        <input class="input" id="remoteThemeFilename" placeholder="remote_example.json">
                    </label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <label class="form-row">
                            <span>名称</span>
                            <input class="input" id="remoteThemeName" placeholder="主题名称">
                        </label>
                        <label class="form-row">
                            <span>作者</span>
                            <input class="input" id="remoteThemeAuthor" placeholder="Aimer">
                        </label>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <label class="form-row">
                            <span>版本</span>
                            <input class="input" id="remoteThemeVersion" placeholder="1.0.0">
                        </label>
                        <label class="form-row">
                            <span>排序</span>
                            <input class="input" id="remoteThemeSortOrder" type="number" value="100">
                        </label>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <label class="form-row">
                            <span>可见性</span>
                            <select class="select" id="remoteThemeVisibility">
                                <option value="public">公开</option>
                                <option value="restricted">兑换码专属</option>
                            </select>
                        </label>
                        <label class="form-row">
                            <span>状态</span>
                            <select class="select" id="remoteThemeStatus">
                                <option value="active">启用</option>
                                <option value="inactive">下架</option>
                            </select>
                        </label>
                    </div>
                    <label class="form-row">
                        <span>说明</span>
                        <input class="input" id="remoteThemeDescription" placeholder="可选">
                    </label>
                    <label class="form-row">
                        <span>主题 JSON</span>
                        <textarea class="input" id="remoteThemeData" spellcheck="false" style="min-height: 260px; font-family: Consolas, monospace; font-size: 12px; line-height: 1.55;" placeholder='{"meta":{"name":"Example"},"colors":{"--bg-primary":"#ffffff"}}'></textarea>
                    </label>
                    <div style="display: flex; gap: 8px; justify-content: flex-end;">
                        <button class="btn" onclick="app.resetRemoteThemeForm()">清空</button>
                        <button class="btn primary" onclick="app.saveRemoteTheme()">保存</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">主题列表</div>
                        <div class="panel-sub" id="remoteThemeCount">-</div>
                    </div>
                </div>
                <div class="panel-body" style="padding: 0;">
                    <div id="remoteThemeList" style="min-height: 360px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-row {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 600;
    }
    .form-row .input,
    .form-row .select {
        font-weight: 400;
    }
</style>
